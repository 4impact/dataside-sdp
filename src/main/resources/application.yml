spring:
  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ${KAFKA_GROUP_ID:sdp-sink-connector}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 10
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: MANUAL_IMMEDIATE

sdp:
  base-url: ${SDP_BASE_URL:https://helpdesk.example.com}
  portal: ${SDP_PORTAL:your-portal-name}
  api-version: v3
  auth:
    type: ${SDP_AUTH_TYPE:API_KEY}   # API_KEY | OAUTH2
    api-key: ${SDP_API_KEY:}
    oauth2:
      token-url: ${SDP_OAUTH_TOKEN_URL:}
      client-id: ${SDP_OAUTH_CLIENT_ID:}
      client-secret: ${SDP_OAUTH_CLIENT_SECRET:}
      scope: SDPOnDemand.requests.ALL

  topics:
    input: ${KAFKA_INPUT_TOPIC:sdp-requests}
    dlq: ${KAFKA_DLQ_TOPIC:sdp-requests-dlq}

  retry:
    max-attempts: ${SDP_RETRY_MAX_ATTEMPTS:3}
    initial-interval-ms: ${SDP_RETRY_INITIAL_MS:1000}
    multiplier: ${SDP_RETRY_MULTIPLIER:2.0}
    max-interval-ms: ${SDP_RETRY_MAX_MS:15000}

logging:
  level:
    com.fourimpact.sdpsinkconnector: INFO
    org.springframework.kafka: INFO
