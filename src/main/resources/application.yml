spring:
  kafka:
    consumer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      group-id: ${KAFKA_GROUP_ID:sdp-sink-connector}
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      max-poll-records: 10
    producer:
      bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      ack-mode: MANUAL_IMMEDIATE

sdp:
  base-url: ${SDP_BASE_URL:https://servicedeskplus.net.au}
  portal: ${SDP_PORTAL:itdesk}
  api-version: v3
  auth:
    type: ${SDP_AUTH_TYPE:OAUTH2}   # API_KEY | OAUTH2
    api-key: ${SDP_API_KEY:}
    oauth2:
      token-url: https://accounts.zoho.com.au/oauth/v2/token
      revoke-url: https://accounts.zoho.com.au/oauth/v2/token/revoke
      client-id: 1000.UA8NGDYKPCX3C8RK6ZDL1VL4H4HBRE
      client-secret: 4a6994ef0bed1c71eb54b553d9aadc07b2f9587a2e
      grant-type: ${SDP_OAUTH_GRANT_TYPE:refresh_token}        # client_credentials | authorization_code | refresh_token
      scope: SDPOnDemand.requests.ALL,SDPOnDemand.setup.READ
      authorization-code: ${SDP_OAUTH_AUTH_CODE:}              # required for grant-type=authorization_code (one-time)
      redirect-uri: ${SDP_OAUTH_REDIRECT_URI:}                 # required for grant-type=authorization_code
      refresh-token: ${SDP_OAUTH_REFRESH_TOKEN:your-refresh-token-here}  # required for grant-type=refresh_token

  topics:
    input: ${KAFKA_INPUT_TOPIC:sdp-requests}
    dlq: ${KAFKA_DLQ_TOPIC:sdp-requests-dlq}

  retry:
    max-attempts: ${SDP_RETRY_MAX_ATTEMPTS:3}
    initial-interval-ms: ${SDP_RETRY_INITIAL_MS:1000}
    multiplier: ${SDP_RETRY_MULTIPLIER:2.0}
    max-interval-ms: ${SDP_RETRY_MAX_MS:15000}

logging:
  level:
    com.fourimpact.sdpsinkconnector: INFO
    org.springframework.kafka: INFO
